name: PR Validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'tools/**'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        run: git diff --name-only origin/main...HEAD > changed_files.txt

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run validation
        id: validate
        run: |
          python .github/scripts/validate_pr.py changed_files.txt > result.txt 2>&1
          echo "exit_code=$?" >> $GITHUB_OUTPUT
          cat result.txt

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const result = fs.readFileSync('result.txt', 'utf8');
            const exitCode = '${{ steps.validate.outputs.exit_code }}';
            const icon = exitCode === '0' ? '✅' : '❌';
            const status = exitCode === '0' ? '校验通过' : '校验失败，请修复后重新提交';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ${icon} PR 自动校验结果\n\n**状态**: ${status}\n\n\`\`\`\n${result}\n\`\`\``
            });

      - name: Fail if validation failed
        if: steps.validate.outputs.exit_code != '0'
        run: exit 1